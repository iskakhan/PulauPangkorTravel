<section id="permission-card" class="permission-card glass-panel hidden" aria-live="polite">
  <div class="permission-icon" aria-hidden="true">
    <i data-lucide="navigation"></i>
  </div>
  <div>
    <h3 id="permission-title">GPS tidak tersedia</h3>
    <p id="permission-message">Benarkan lokasi untuk meneruskan.</p>
  </div>
  <button
    id="permission-close-button"
    class="icon-button subtle"
    type="button"
    aria-label="Tutup popup"
    title="Tutup"
  >
    <i data-lucide="x"></i>
  </button>
  <button id="retry-location-button" class="secondary-action" type="button">
    <i data-lucide="rotate-cw"></i>
    <span>Cuba lagi</span>
  </button>
</section>

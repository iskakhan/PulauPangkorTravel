<section
  id="destination-modal"
  class="destination-modal hidden"
  aria-modal="true"
  aria-labelledby="modal-title"
  role="dialog"
>
  <div class="sheet-panel glass-panel">
    <div class="sheet-handle" aria-hidden="true"></div>
    <div class="sheet-header">
      <div class="sheet-title">
        <p id="modal-distance" class="section-kicker"></p>
        <h3 id="modal-title"></h3>
      </div>
      <button
        id="modal-close"
        class="icon-button glass-control"
        type="button"
        aria-label="Tutup butiran lokasi"
        title="Tutup"
      >
        <i data-lucide="x"></i>
      </button>
    </div>
    <div id="location-card-content" class="location-card-content"></div>
  </div>
</section>

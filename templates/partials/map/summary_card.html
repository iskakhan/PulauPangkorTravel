<section id="map-summary" class="map-summary glass-panel" aria-live="polite">
  <div class="summary-meta">
    <span id="summary-kicker">Sedia</span>
    <span id="session-status">Sesi aktif</span>
  </div>
  <h2 id="summary-title">Peta Pulau Pangkor</h2>
  <p id="summary-description">Lihat kawasan menarik, pantai, jeti, makanan, dan aktiviti sekitar pulau.</p>
  <div class="summary-actions">
    <span id="accuracy-pill" class="status-pill">Ketepatan belum tersedia</span>
    <button id="open-destination-button" class="secondary-action hidden" type="button">
      <i data-lucide="info"></i>
      <span>Lihat</span>
    </button>
  </div>
</section>

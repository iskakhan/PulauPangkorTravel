<header class="map-topbar glass-panel">
  <div class="topbar-copy">
    <span class="section-kicker">Pangkor Smart Tourism</span>
    <h2 id="map-heading">Jelajah Pangkor</h2>
    <p id="location-status" aria-live="polite">GPS belum aktif</p>
  </div>
  <div class="topbar-actions">
    <button
      id="recenter-button"
      class="icon-button glass-control"
      type="button"
      aria-label="Pusatkan lokasi"
      title="Pusatkan lokasi"
    >
      <i data-lucide="crosshair"></i>
    </button>
    <button
      id="overview-button"
      class="icon-button glass-control"
      type="button"
      aria-label="Lihat seluruh Pulau Pangkor"
      title="Lihat seluruh Pulau Pangkor"
    >
      <i data-lucide="map"></i>
    </button>
    <button
      id="map-mode-button"
      class="icon-button glass-control"
      type="button"
      aria-label="Tukar paparan GO 3D"
      title="Tukar paparan GO 3D"
      aria-pressed="false"
    >
      <i data-lucide="navigation"></i>
    </button>
    <button
      id="lang-toggle-button"
      class="icon-button glass-control"
      type="button"
      aria-label="Tukar Bahasa"
      title="Tukar Bahasa"
    >
      <span class="lang-text" style="font-weight:bold; font-size:12px;">EN</span>
    </button>
    <button
      id="logout-button"
      class="icon-button glass-control hidden"
      type="button"
      aria-label="Keluar"
      title="Keluar"
    >
      <i data-lucide="log-out"></i>
    </button>
  </div>
</header>

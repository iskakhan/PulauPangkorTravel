<section class="trainer-status glass-panel" aria-label="Status pemain">
  <div class="trainer-status-main">
    <span class="trainer-avatar" aria-hidden="true">
      <i data-lucide="compass"></i>
    </span>
    <div>
      <p id="auth-status" class="section-kicker">Log masuk diperlukan</p>
      <h3 id="user-coordinates">Mencari GPS</h3>
    </div>
  </div>
  <div class="trainer-stats">
    <span>
      <strong id="nearby-count">0</strong>
      Kawasan
    </span>
    <span>
      <strong id="unlocked-count">0</strong>
      Unlock
    </span>
  </div>
  <div class="weather-strip" aria-label="Cuaca semasa">
    <span class="weather-icon" aria-hidden="true">
      <i data-lucide="cloud-sun"></i>
    </span>
    <div class="weather-copy">
      <strong id="weather-temperature">Cuaca --</strong>
      <small id="weather-summary">Menunggu lokasi</small>
    </div>
    <span id="weather-wind" class="weather-wind">Angin --</span>
  </div>
  <button id="login-prompt-button" class="secondary-action" type="button">
    <i data-lucide="key-round"></i>
    <span>Log masuk</span>
  </button>
</section>
